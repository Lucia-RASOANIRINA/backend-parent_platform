spring.application.name=parentplatform

server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/platform_parent
spring.datasource.username=postgres
spring.datasource.password=1701

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Configuration des uploads
file.upload-dir=./uploads
spring.servlet.multipart.location=./uploads

spring.datasource.hikari.auto-commit=false

# CORS Configuration
spring.web.cors.allowed-origin-patterns=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# WebSocket
spring.websocket.cors.allowed-origins=*